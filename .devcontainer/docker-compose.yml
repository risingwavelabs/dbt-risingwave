services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3-3.10-trixie
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      # The functional-test conftest and the generated dbt profiles read these,
      # so they connect to the RisingWave service below (by its compose name).
      DBT_HOST: risingwave
      DBT_PORT: "4566"
    depends_on:
      - risingwave

  risingwave:
    image: ghcr.io/risingwavelabs/risingwave:latest
    command: single_node
    ports:
      # 4566 = Postgres wire protocol (psql / dbt), 5691 = RisingWave dashboard
      - "4566:4566"
      - "5691:5691"
