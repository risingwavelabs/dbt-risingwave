functions:
  - name: double_price_py
    description: Double an input price with an external Python UDF server.
    config:
      language: python
      link: "{{ env_var('PY_UDF_SERVER_URL', 'http://127.0.0.1:8815') }}"
    arguments:
      - name: price
        data_type: float8
    returns:
      data_type: float8
